      function nextActiveDeadline(publishAt = new Date()) {

        if (deadline <= publishedAt) deadline = new Date(deadline.getTime() + 86400000);

      const QUICK_BID_INCREMENT = 1000;

      let supabaseClient;

      function getSupabaseClient() {
        if (supabaseClient) return supabaseClient;

        const config = window.__SUPABASE_CONFIG__ || {};
        const url = String(config.url || "").trim();
        const publishableKey = String(
          config.publishableKey || config.anonKey || "",
        ).trim();

        if (!url || !publishableKey) {
          throw new Error(
            "Supabase 연결 설정이 없습니다. window.__SUPABASE_CONFIG__의 url과 publishableKey를 입력해 주세요.",
          );
        }
        if (!window.supabase?.createClient) {
          throw new Error(
            "Supabase SDK를 불러오지 못했습니다. 인터넷 연결을 확인해 주세요.",
          );
        }

        supabaseClient = window.supabase.createClient(url, publishableKey, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
          },
        });
        return supabaseClient;
      }

      function createUuid() {
        if (window.crypto?.randomUUID) return window.crypto.randomUUID();

        const bytes = new Uint8Array(16);
        window.crypto.getRandomValues(bytes);
        bytes[6] = (bytes[6] & 0x0f) | 0x40;
        bytes[8] = (bytes[8] & 0x3f) | 0x80;
        const hex = Array.from(bytes, (value) =>
          value.toString(16).padStart(2, "0"),
        );
        return `${hex.slice(0, 4).join("")}-${hex.slice(4, 6).join("")}-${hex
          .slice(6, 8)
          .join("")}-${hex.slice(8, 10).join("")}-${hex
          .slice(10)
          .join("")}`;
      }

      function getImageExtension(file) {
        const fileExtension = String(file.name || "")
          .split(".")
          .pop()
          .toLowerCase();
        if (/^[a-z0-9]{1,8}$/.test(fileExtension)) return fileExtension;

        const mimeExtension = String(file.type || "")
          .split("/")
          .pop()
          .toLowerCase();
        return /^[a-z0-9]{1,8}$/.test(mimeExtension)
          ? mimeExtension
          : "jpg";
      }

      function toArray(value) {
        if (Array.isArray(value)) return value;
        if (typeof value !== "string" || !value.trim()) return [];
        try {
          const parsed = JSON.parse(value);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [value];
        }
      }

      function isSupabaseAdmin(user) {
        return user?.app_metadata?.role === "admin";
      }

      function mapProductRow(row) {
        const description = String(row.description || "").trim();
        const publishAt = row.publish_at || row.created_at || new Date().toISOString();
        const startingPrice = Number(row.starting_price || 0);
        const bidHistory = toArray(row.bid_history);

        return {
          id: String(row.id),
          title:
            String(row.title || "").trim() ||
            description.split(/\r?\n/)[0] ||
            "구제 의류 상품",
          description,
          category: String(row.category || "구제 의류"),
          condition: "상품 설명 참고",
          createdAt: row.created_at || publishAt,
          publish_at: publishAt,
          closesAt: row.closes_at || nextActiveDeadline(publishAt),
          status: row.status,
          startingPrice,
          currentPrice: Number(row.current_price ?? startingPrice),
          bidIncrement: Number(row.bid_increment || QUICK_BID_INCREMENT),
          participantCount: Number(row.participant_count || 0),
          imageUrls: toArray(row.image_urls).filter(Boolean),
          bidHistory: Object.freeze(bidHistory),
        };
      }

      async function fetchPublishedProducts() {
        const client = getSupabaseClient();
        const { data, error } = await client
          .from("products")
          .select("*")
          .eq("status", "active")
          .lte("publish_at", new Date().toISOString())
          .order("publish_at", { ascending: false });

        if (error) throw error;
        return (data || []).map(mapProductRow);
      }

      async function uploadProductImages(client, productId, files) {
        const storage = client.storage.from(PRODUCT_IMAGES_BUCKET);
        const uploadedPaths = [];
        const publicUrls = [];

        try {
          for (const [index, file] of files.entries()) {
            const extension = getImageExtension(file);
            const path = `products/${productId}/${Date.now()}-${index}-${createUuid()}.${extension}`;
            const { error } = await storage.upload(path, file, {
              cacheControl: "31536000",
              contentType: file.type || `image/${extension}`,
              upsert: false,
            });
            if (error) throw error;

            uploadedPaths.push(path);
            const { data } = storage.getPublicUrl(path);
            if (!data?.publicUrl) {
              throw new Error("업로드한 사진의 공개 주소를 만들지 못했습니다.");
            }
            publicUrls.push(data.publicUrl);
          }

          return { publicUrls, uploadedPaths };
        } catch (error) {
          if (uploadedPaths.length) {
            await storage.remove(uploadedPaths).catch(() => undefined);
          }
          throw error;
        }
      }

      async function createSupabaseProduct(values) {
        const client = getSupabaseClient();
        const {
          data: { user },
          error: authError,
        } = await client.auth.getUser();
        if (authError || !isSupabaseAdmin(user)) {
          throw new Error("관리자 인증이 만료되었습니다. 다시 로그인해 주세요.");
        }

        const productId = createUuid();
        const { publicUrls, uploadedPaths } = await uploadProductImages(
          client,
          productId,
          values.imageFiles,
        );
        const now = new Date().toISOString();
        const productRow = {
          id: productId,
          title: values.title,
          description: values.description,
          category: "구제 의류",
          starting_price: values.startingPrice,
          current_price: values.startingPrice,
          bid_increment: QUICK_BID_INCREMENT,
          participant_count: 0,
          image_urls: publicUrls,
          status: values.status,
          publish_at: values.publish_at,
          closes_at: nextActiveDeadline(values.publish_at),
          created_at: now,
          bid_history: [],
        };
        const { error } = await client.from("products").insert(productRow);

        if (error) {
          await client.storage
            .from(PRODUCT_IMAGES_BUCKET)
            .remove(uploadedPaths)
            .catch(() => undefined);
          throw error;
        }

        return mapProductRow(productRow);
      }

      function getQuickBidAmount(post) {
        return post.participantCount === 0

      function getKstParts(value = new Date()) {
        const parts = new Intl.DateTimeFormat("en-CA", {
          timeZone: "Asia/Seoul",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hourCycle: "h23",
        }).formatToParts(value).reduce((result, part) => {
          if (part.type !== "literal") result[part.type] = Number(part.value);
          return result;
        }, {});
        return parts;
      }

      function getTodayKstTime(value, hour, minute = 0) {
        const parts = getKstParts(value);
        return new Date(Date.UTC(parts.year, parts.month - 1, parts.day, hour - 9, minute, 0));
      }

      function getBidAccess(post, currentUserName, value = new Date()) {
        const now = value instanceof Date ? value : new Date(value);
        const publishAt = post.publish_at ? new Date(post.publish_at) : null;
        if (
          post.status === "pending" ||
          (publishAt && Number.isFinite(publishAt.getTime()) && publishAt > now)
        ) {
          return { allowed: false, reason: "공개 예약 상품" };
        }
        if (post.status === "closed") return { allowed: false, reason: "판매 완료" };
        const cutoff = getTodayKstTime(now, 20, 56);
        const deadline = getTodayKstTime(now, 21, 0);
        if (now >= deadline) return { allowed: false, reason: "오늘 경매 마감" };
        if (now < cutoff) return { allowed: true, reason: "입찰 가능" };

        const normalizedName = String(currentUserName || "").trim();
        const beforeCutoff = post.bidHistory.filter((bid) => new Date(bid.bidAt) < cutoff);
        const wasExistingParticipant = beforeCutoff.some((bid) => bid.bidderName.trim() === normalizedName);
        if (wasExistingParticipant) return { allowed: true, reason: "기존 참여자 입찰 가능" };

        if (post.bidHistory.length === 0) return { allowed: true, reason: "무입찰 상품 첫 입찰 가능" };

        // 20:56 당시 무입찰이던 상품은 첫 입찰자만 21:00까지 계속 참여할 수 있습니다.
        if (beforeCutoff.length === 0) {
          const firstAfterCutoff = [...post.bidHistory].sort(
            (left, right) => new Date(left.bidAt) - new Date(right.bidAt),
          )[0];
          if (firstAfterCutoff?.bidderName.trim() === normalizedName) {
            return { allowed: true, reason: "무입찰 상품 첫 참여자 전용" };
          }
        }

        return { allowed: false, reason: "⛔ 신규 입찰 마감 (기존 참여자 전용)" };
      }

      function addKeepDays(paidAt, isBulky) {
        const expiresAt = new Date(paidAt);
        expiresAt.setDate(expiresAt.getDate() + (isBulky ? 7 : 14));
        return expiresAt.toISOString();
      }

      function getKeepDday(item, now = new Date()) {
        const expiresAt = new Date(item.keepUntil || addKeepDays(item.paidAt, item.isBulky));
        const days = Math.max(0, Math.ceil((expiresAt - now) / 86400000));
        return expiresAt <= now ? "보관 만료" : days === 0 ? "D-DAY" : `D-${days}`;
      }

      function getNextShippingSchedule(now = new Date()) {
        const kst = getKstParts(now);
        const weekdayFormatter = new Intl.DateTimeFormat("en-US", {
          timeZone: "Asia/Seoul",
          weekday: "short",
        });
        for (let offset = 1; offset <= 7; offset += 1) {
          const candidate = new Date(Date.UTC(kst.year, kst.month - 1, kst.day + offset, 8, 0, 0));
          if (["Tue", "Wed", "Thu"].includes(weekdayFormatter.format(candidate))) {
            return candidate.toISOString();
          }
        }
        return null;
      }

      function formatShippingSchedule(iso) {
        const value = new Date(iso);
        const dateLabel = new Intl.DateTimeFormat("ko-KR", {

        }).format(value);
        const weekdayLabel = new Intl.DateTimeFormat("ko-KR", {
          timeZone: "Asia/Seoul",
          weekday: "short",
        }).format(value);
        return `${dateLabel}(${weekdayLabel})`;
      }

      function getHighestBid(history) {
        return history.reduce((highest, bid) => {
          if (!highest || bid.amount > highest.amount) return bid;
          if (bid.amount < highest.amount) return highest;
          return new Date(bid.bidAt) > new Date(highest.bidAt) ? bid : highest;
        }, null);
      }

      function getUserBidState(post, currentUserName) {
        const leadingBid = getHighestBid(post.bidHistory);
        if (!leadingBid) return { status: "no-bids", leadingBid: null, userHighestBid: null };

        const normalizedName = String(currentUserName || "").trim();
        const userHighestBid = getHighestBid(
          post.bidHistory.filter((bid) => bid.bidderName.trim() === normalizedName),
        );
        if (!userHighestBid) return { status: "other-leading", leadingBid, userHighestBid: null };

        return {
          status: leadingBid.id === userHighestBid.id ? "user-leading" : "user-outbid",
          leadingBid,
          userHighestBid,
        };

      function splitDescription(description) {
        const lines = String(description || "").split("\n").map((line) => line.trim()).filter(Boolean);
        if (lines.length > 1) return { lead: lines[0], detail: lines.slice(1).join(" ") };
        const source = lines[0] || "상품 설명 준비 중";
        const sentenceEnd = source.search(/[.!?]\s/);
        if (sentenceEnd < 0) return { lead: source, detail: "" };
        return {
          lead: source.slice(0, sentenceEnd + 1),
          detail: source.slice(sentenceEnd + 1).trim(),

      function Modal({
        open,

        const titleId = useId();

        useEffect(() => {
          if (!open) return undefined;
          const previousOverflow = document.body.style.overflow;
          document.body.style.overflow = "hidden";
          const onKeyDown = (event) => {
            if (event.key === "Escape" && closeOnEscape) onClose();
          };
          window.addEventListener("keydown", onKeyDown);
          return () => {
            document.body.style.overflow = previousOverflow;
            window.removeEventListener("keydown", onKeyDown);
          };
        }, [open, onClose, closeOnEscape]);

        if (!open) return null;

        return ReactDOM.createPortal(
          <div className="fixed inset-0 z-[100] flex items-center justify-center p-3 sm:p-6" role="presentation">

              className="absolute inset-0 cursor-default bg-ink/65 backdrop-blur-sm"

      function AuctionClock() {
        const [now, setNow] = useState(() => new Date());
        useEffect(() => {
          const timer = window.setInterval(() => setNow(new Date()), 1000);
          return () => window.clearInterval(timer);
        }, []);

        const deadline = getTodayKstTime(now, 21, 0);
        const countdown = getCountdown(now, deadline);
        const newBidCutoff = getTodayKstTime(now, 20, 56);
        const existingOnly = now >= newBidCutoff && now < getTodayKstTime(now, 21, 0);
        const timeText = new Intl.DateTimeFormat("ko-KR", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        }).format(now);

        return (
          <section className="overflow-hidden rounded-[2rem] border border-white/80 bg-white/65 shadow-card backdrop-blur animate-rise">
            <div className="grid md:grid-cols-[1fr_1.35fr]">
              <div className="flex items-center justify-between gap-4 border-b border-sand/60 p-5 md:border-b-0 md:border-r sm:p-6">
                <div>
                  <p className="text-xs font-black tracking-[.18em] text-muted">CURRENT TIME</p>
                  <p className="mt-2 text-sm font-bold text-muted">{formatFullDate(now.toISOString())}</p>
                </div>
                <time className="font-mono text-2xl font-black tabular-nums sm:text-3xl" dateTime={now.toISOString()}>{timeText}</time>
              </div>
              <div className="relative flex items-center justify-between gap-4 overflow-hidden bg-coral/10 p-5 sm:p-6">
                <span className="absolute -right-8 -top-10 h-32 w-32 rounded-full bg-sky/45" />
                <div className="relative">
                  <p className="text-xs font-black tracking-[.18em] text-coral-dark">TODAY&apos;S UPLOADS · 9:00 PM</p>
                  <p className="mt-2 text-sm font-extrabold">오늘 등록 상품 정산까지</p>
                </div>
                {countdown.finished ? (
                  <strong className="relative rounded-2xl bg-ink px-5 py-3 text-sm text-white">오늘 상품 정산 완료</strong>
                ) : (
                  <div className="relative text-right">
                    <div className="flex items-center justify-end gap-1 font-mono text-2xl font-black tabular-nums sm:text-3xl" aria-label={`${countdown.hours}시간 ${countdown.minutes}분 ${countdown.seconds}초 남음`}>
                      <span>{pad(countdown.hours)}</span><span className="text-coral">:</span>
                      <span>{pad(countdown.minutes)}</span><span className="text-coral">:</span>
                      <span>{pad(countdown.seconds)}</span>
                    </div>
                    <p className={`mt-1 text-xs font-black ${existingOnly ? "text-red-700" : "text-coral-dark"}`}>
                      {existingOnly ? "20:56 신규 입찰 마감 · 기존 참여자 전용" : "20:56부터 신규 입찰 제한"}
                    </p>
                  </div>
                )}
              </div>
            </div>
          </section>
        );
      }

      /* ------------------------------------------------------------------
       * Feed Components
       * ------------------------------------------------------------------ */
      function PhotoGalleryModal({ open, images, title, startIndex, onClose }) {
        const [activeIndex, setActiveIndex] = useState(startIndex || 0);
        const touchStart = useRef(null);

        useEffect(() => {
          if (open) setActiveIndex(startIndex || 0);
        }, [open, startIndex]);

        const move = useCallback((direction) => {
          setActiveIndex((current) => (current + direction + images.length) % images.length);
        }, [images.length]);

        useEffect(() => {
          if (!open) return undefined;
          const onKeyDown = (event) => {
            if (event.key === "ArrowLeft") move(-1);
            if (event.key === "ArrowRight") move(1);
          };
          window.addEventListener("keydown", onKeyDown);
          return () => window.removeEventListener("keydown", onKeyDown);
        }, [open, move]);

        return (
          <Modal open={open} onClose={onClose} className="max-w-6xl" showCloseButton={false}>
            <div
              className="relative flex h-[90dvh] min-h-[34rem] max-h-[64rem] flex-col overflow-hidden rounded-[1.75rem] border border-white/10 bg-[#28333b] text-white shadow-2xl sm:h-[92dvh]"
              onTouchStart={(event) => { touchStart.current = event.touches[0].clientX; }}
              onTouchEnd={(event) => {
                if (touchStart.current === null) return;
                const delta = event.changedTouches[0].clientX - touchStart.current;
                if (Math.abs(delta) > 45) move(delta > 0 ? -1 : 1);
                touchStart.current = null;
              }}
            >
              <span className="pointer-events-none absolute -left-24 -top-24 h-64 w-64 rounded-full bg-coral/10 blur-3xl" />
              <span className="pointer-events-none absolute -bottom-24 -right-24 h-72 w-72 rounded-full bg-sky/10 blur-3xl" />

              <div className="relative flex items-center justify-between gap-4 border-b border-white/10 bg-white/[.035] px-4 py-4 sm:px-6">
                <div className="min-w-0">
                  <p className="truncate text-[17px] font-black text-white/90">{title}</p>
                  <p className="mt-1 text-sm font-bold text-white/55">사진 {activeIndex + 1} / {images.length}</p>
                </div>
                <button onClick={onClose} className="grid h-12 w-12 shrink-0 place-items-center rounded-full border border-white/10 bg-white/10 text-2xl transition hover:bg-white/20 focus:outline-none focus:ring-4 focus:ring-coral/30" aria-label="갤러리 닫기">×</button>
              </div>

              <div className="relative flex min-h-0 flex-1 items-center justify-center px-3 py-3 sm:px-16 sm:py-5">
                <div className="absolute inset-3 rounded-2xl bg-black/10 sm:inset-y-5 sm:inset-x-14" />
                <img src={images[activeIndex]} alt={`${title} 사진 ${activeIndex + 1}`} className="relative max-h-full max-w-full rounded-2xl object-contain shadow-2xl ring-1 ring-white/10" />
                {images.length > 1 && (
                  <>
                    <button onClick={() => move(-1)} className="absolute left-3 grid h-12 w-12 place-items-center rounded-full border border-white/15 bg-[#1c252b]/80 text-3xl shadow-lg backdrop-blur transition hover:bg-coral/80 focus:outline-none focus:ring-4 focus:ring-coral/30 sm:left-6" aria-label="이전 사진">‹</button>
                    <button onClick={() => move(1)} className="absolute right-3 grid h-12 w-12 place-items-center rounded-full border border-white/15 bg-[#1c252b]/80 text-3xl shadow-lg backdrop-blur transition hover:bg-coral/80 focus:outline-none focus:ring-4 focus:ring-coral/30 sm:right-6" aria-label="다음 사진">›</button>
                  </>
                )}
              </div>

              <div className="relative hide-scrollbar flex shrink-0 gap-2.5 overflow-x-auto border-t border-white/10 bg-black/10 px-4 py-4 sm:justify-center sm:px-6">
                {images.map((image, index) => (
                  <button key={image} onClick={() => setActiveIndex(index)} className={`h-16 w-16 shrink-0 overflow-hidden rounded-xl border-2 shadow-md transition sm:h-20 sm:w-20 ${activeIndex === index ? "border-coral opacity-100 ring-2 ring-coral/25" : "border-white/10 opacity-50 hover:opacity-90"}`} aria-label={`${index + 1}번 사진 보기`}>
                    <img src={image} alt="" className="h-full w-full object-cover" />
                  </button>
                ))}
              </div>
            </div>
          </Modal>
        );
      }

      function PhotoGallery({ images, title }) {
        const [galleryOpen, setGalleryOpen] = useState(false);
        const [startIndex, setStartIndex] = useState(0);
        const thumbs = images.slice(1, 4);
        const hiddenCount = Math.max(0, images.length - 4);

        const openAt = (index) => {
          setStartIndex(index);
          setGalleryOpen(true);
        };

        return (
          <>
            <div className="space-y-1.5">
              <button onClick={() => openAt(0)} className="group relative block aspect-[4/3] w-full overflow-hidden rounded-[1.1rem] bg-sand/40" aria-label={`${title} 사진 크게 보기`}>
                <img src={images[0]} alt={`${title} 대표 사진`} className="h-full w-full object-cover transition duration-500 group-hover:scale-[1.025]" />
                <span className="absolute bottom-3 right-3 rounded-full bg-ink/70 px-3 py-1.5 text-xs font-bold text-white opacity-0 backdrop-blur transition group-hover:opacity-100">사진 전체 보기</span>
              </button>
              {thumbs.length > 0 && (
                <div className="grid grid-cols-3 gap-1.5">
                  {thumbs.map((image, index) => {
                    const isLast = index === thumbs.length - 1;
                    return (
                      <button key={image} onClick={() => openAt(index + 1)} className="relative aspect-[2/1] overflow-hidden rounded-xl bg-sand/40" aria-label={`${index + 2}번 사진 보기`}>
                        <img src={image} alt="" className="h-full w-full object-cover transition hover:scale-105" />

                        )}
                      </button>
                    );
                  })}
                </div>

            <PhotoGalleryModal open={galleryOpen} images={images} title={title} startIndex={startIndex} onClose={() => setGalleryOpen(false)} />
          </>
        );
      }

      function BidInputModal({ post, open, onClose, onSubmit }) {
        const minimumBid = getMinimumBidAmount(post);
        const [amount, setAmount] = useState(String(minimumBid));
        const [error, setError] = useState("");

        useEffect(() => {
          if (!open) return;
          setAmount(String(minimumBid));
          setError("");
        }, [open, minimumBid]);

        const submit = (event) => {
          event.preventDefault();
          const numericAmount = Number(amount);
          if (!Number.isInteger(numericAmount)) {
            setError("입찰 금액을 원 단위 정수로 입력해 주세요.");
            return;
          }
          if (numericAmount < minimumBid) {
            setError(`최소 입찰 금액은 ${formatKRW(minimumBid)}입니다.`);
            return;
          }
          if ((numericAmount - minimumBid) % QUICK_BID_INCREMENT !== 0) {
            setError(`${formatKRW(QUICK_BID_INCREMENT)} 단위로 입력해 주세요.`);
            return;
          }
          onSubmit(numericAmount);
        };

        return (
          <Modal
            open={open}
            onClose={onClose}
            title="경매 참여하기"
            description={`‘${post.title}’의 희망 입찰가를 입력해 주세요.`}
          >
            <form onSubmit={submit} className="space-y-5 p-5 sm:p-6">
              <div className="grid grid-cols-2 gap-3 rounded-2xl bg-sky/25 p-4">
                <div>
                  <p className="text-sm font-bold text-muted">현재 가격</p>
                  <p className="mt-1 text-lg font-black">{formatKRW(post.currentPrice)}</p>
                </div>
                <div className="border-l border-sky pl-3">
                  <p className="text-sm font-bold text-muted">최소 입찰가</p>
                  <p className="mt-1 text-lg font-black text-coral-dark">{formatKRW(minimumBid)}</p>
                </div>
              </div>
              <label className="block">
                <span className="mb-2 block text-base font-black">희망 경매 가격</span>
                <div className="relative">
                  <input
                    autoFocus
                    type="number"
                    inputMode="numeric"
                    min={minimumBid}
                    step={QUICK_BID_INCREMENT}
                    value={amount}
                    onChange={(event) => { setAmount(event.target.value); setError(""); }}
                    className="h-16 w-full rounded-2xl border-2 border-sand bg-white px-4 pr-14 text-right text-2xl font-black tabular-nums outline-none transition focus:border-coral focus:ring-4 focus:ring-coral/15"
                    aria-describedby="bid-input-help bid-input-error"
                  />
                  <span className="absolute right-4 top-1/2 -translate-y-1/2 text-base font-black text-muted">원</span>
                </div>
                <span id="bid-input-help" className="mt-2 block text-sm font-semibold text-muted">
                  {post.participantCount === 0
                    ? `첫 입찰은 시작가 ${formatKRW(minimumBid)}부터 가능합니다.`
                    : `${formatKRW(minimumBid)} 이상, ${formatKRW(QUICK_BID_INCREMENT)} 단위로 입력해 주세요.`}
                </span>
                {error && <span id="bid-input-error" className="mt-2 block text-base font-bold text-coral-dark" role="alert">{error}</span>}
              </label>
              <div className="grid grid-cols-2 gap-3">
                <Button variant="outline" size="lg" className="min-h-16 text-lg font-black" onClick={onClose}>취소</Button>
                <Button type="submit" size="lg" className="min-h-16 text-lg font-black">입찰 금액 확인</Button>
              </div>
            </form>
          </Modal>
        );
      }

      function BidConfirmModal({ open, amount, itemTitle, onClose, onConfirm }) {
        const [isSubmitting, setIsSubmitting] = useState(false);
        const [error, setError] = useState("");
        const submittingRef = useRef(false);

        useEffect(() => {
          if (open) setError("");
        }, [open, amount]);

        const handleClose = () => {
          if (isSubmitting) return;
          setError("");
          onClose();
        };

        const handleConfirm = async () => {
          if (submittingRef.current) return;
          submittingRef.current = true;
          setIsSubmitting(true);
          setError("");
          try {
            await onConfirm();
          } catch (bidError) {
            setError(bidError instanceof Error && bidError.message
              ? bidError.message
              : "입찰을 완료하지 못했습니다. 잠시 후 다시 시도해 주세요.");
          } finally {
            submittingRef.current = false;
            setIsSubmitting(false);
          }
        };

        return (
          <Modal
            open={open}
            onClose={handleClose}
            title="입찰 전 마지막 확인"
            description="‘예’를 눌러야만 입찰이 완료됩니다."
            closeOnBackdrop={false}
            closeOnEscape={false}
            showCloseButton={false}
          >
            <div className="p-5 sm:p-7">
              <p className="break-keep text-center text-base font-bold leading-7 text-muted">{itemTitle}</p>
              <p className="mt-4 break-keep text-center text-2xl font-black leading-tight sm:text-3xl">
                <strong className="text-coral-dark">{formatKRW(amount)}</strong>
                <br />
                입찰을 진행하시겠습니까?
              </p>
              <p className="mt-5 rounded-2xl border-2 border-coral/45 bg-coral/15 px-4 py-3 text-center text-[17px] font-black leading-7 text-coral-dark">
                ⚠️ 입찰 후 취소 불가 (미입금 시 누적 경고 부여)
              </p>
              {error && <p role="alert" className="mt-4 rounded-xl bg-red-50 px-3 py-2 text-center text-base font-bold text-red-700">{error}</p>}
              <div className="mt-6 grid grid-cols-2 gap-3">
                <Button variant="outline" size="lg" onClick={handleClose} disabled={isSubmitting} className="min-h-16 text-xl font-black">아니오</Button>
                <Button size="lg" onClick={handleConfirm} disabled={isSubmitting} className="min-h-16 text-xl font-black">{isSubmitting ? "처리 중…" : "예"}</Button>
              </div>
            </div>
          </Modal>
        );
      }

          >
            <div className="p-5 sm:p-6">
              <div className="rounded-2xl border border-sky bg-sky/25 px-4 py-3">

                <p className="mt-1 text-sm font-semibold leading-6 text-[#58777e]">관리자 화면에서도 이 기록을 수정하는 기능은 제공되지 않습니다.</p>

                      <div className="flex items-start justify-between gap-4">
                        <div className="min-w-0">

                            <strong className="text-lg font-black">{maskBidderName(bid.bidderName)}</strong>
                            {index === 0 && <span className="rounded-full bg-coral/15 px-2.5 py-1 text-xs font-black text-coral-dark">최신 입찰</span>}
                          </div>
                          <time dateTime={bid.bidAt} className="mt-1 block text-sm font-bold text-muted">{formatBidTime(bid.bidAt)}</time>

                  ))}
                </ol>
              ) : (
                <div className="mt-5 rounded-2xl border border-dashed border-sand bg-cream/60 px-5 py-10 text-center">
                  <p className="text-lg font-black">아직 입찰 기록이 없습니다</p>
                  <p className="mt-2 text-base font-semibold text-muted">첫 입찰 기록이 등록되면 이곳에 표시됩니다.</p>
                </div>
              )}
            </div>
          </Modal>
        );
      }

      function ProductInquiryModal({ post, open, onClose, onSend }) {
        const [message, setMessage] = useState("");
        const [error, setError] = useState("");
        const [sending, setSending] = useState(false);
        const { lead } = splitDescription(post.description);

        useEffect(() => {
          if (open) {
            setMessage("");
            setError("");
            setSending(false);
          }
        }, [open]);

        const submit = async (event) => {
          event.preventDefault();
          const nextMessage = message.trim();
          if (!nextMessage) {
            setError("문의 내용을 입력해 주세요.");
            return;
          }
          setSending(true);
          try {
            await onSend(post.id, nextMessage);
            onClose();
          } catch (sendError) {
            setError(sendError?.message || "문의 전송에 실패했습니다. 다시 시도해 주세요.");
            setSending(false);
          }
        };

        return (
          <Modal open={open} onClose={onClose} title="상품 문의하기" description={lead} className="max-w-lg">
            <form onSubmit={submit} className="p-5 sm:p-6">
              <label htmlFor={`inquiry-${post.id}`} className="mb-2 block text-base font-black">문의 내용</label>
              <textarea
                id={`inquiry-${post.id}`}
                value={message}
                onChange={(event) => { setMessage(event.target.value); setError(""); }}
                rows="5"
                autoFocus
                className="w-full resize-none rounded-2xl border-2 border-sand bg-cream/45 px-4 py-3 text-[17px] leading-7 outline-none focus:border-coral focus:ring-4 focus:ring-coral/15"
                placeholder="사이즈, 상태, 배송 등 궁금한 내용을 적어 주세요."
              />
              {error && <p className="mt-2 font-bold text-red-600" role="alert">{error}</p>}
              <div className="mt-5 grid grid-cols-2 gap-3">
                <Button variant="outline" size="lg" className="min-h-14 text-lg" onClick={onClose}>취소</Button>
                <Button type="submit" size="lg" disabled={sending} className="min-h-14 text-lg">{sending ? "보내는 중" : "보내기"}</Button>
              </div>
            </form>
          </Modal>
        );
      }

      function DateFilterChips({ dateKeys, selectedDate, onSelect }) {

          <nav className="rounded-[1.4rem] border border-white/90 bg-white/70 p-3 shadow-card" aria-label="업로드 날짜별 상품 보기">

        const requestManualBid = (amount) => {
          setBidOpen(false);
          setPendingBidAmount(amount);

          if (!canBid) return;
          setPendingBidAmount(quickBidAmount);

        const confirmBid = async () => {

          await onBid(post.id, pendingBidAmount);
          setPendingBidAmount(null);

            address: form.address,
            isDefault: true,

            ? addresses.map((address) => address.isDefault ? nextDefault : address)
            : [nextDefault, ...addresses];

      function getPaymentTimeLeft(items, now) {
        const deadlines = items.map((item) => new Date(item.paymentDeadlineAt || nextPaymentDeadline(now)).getTime()).filter(Number.isFinite);
        if (!deadlines.length) return { expired: false, hours: 0, minutes: 0, seconds: 0, deadline: null };
        const deadline = new Date(Math.min(...deadlines));
        const totalSeconds = Math.max(0, Math.ceil((deadline - now) / 1000));
        return {
          expired: deadline <= now,
          hours: Math.floor(totalSeconds / 3600),
          minutes: Math.floor((totalSeconds % 3600) / 60),
          seconds: totalSeconds % 60,
          deadline,
        };
      }

      function PaymentWaitingList({ items, now, onStartBatchPayment, onViewAccount }) {
        const total = items.reduce((sum, item) => sum + item.winningBid, 0);
        const hasStarted = items.some((item) => item.paymentStarted);
        const paymentClock = getPaymentTimeLeft(items, now);
        return (
          <section className="rounded-[2rem] border border-white/90 bg-white/70 p-5 shadow-card sm:p-7">
            <div className="flex flex-wrap items-end justify-between gap-3">
              <div>

                <p className="mt-2 text-[17px] font-bold text-muted">합계 {formatKRW(total)} · 계좌는 결제 진행 후에만 표시됩니다.</p>

                      <p className="mt-1 text-[17px] font-bold text-[#876259]">다음날 오전 11:59:59 마감</p>
                    </div>
                    <strong role="timer" className="text-3xl font-black tabular-nums tracking-tight text-[#c65649]">
                      {paymentClock.expired ? "입금 마감" : `${pad(paymentClock.hours)}:${pad(paymentClock.minutes)}:${pad(paymentClock.seconds)}`}

                </div>
                <p role="alert" className="mt-3 rounded-2xl bg-[#fff7df] px-4 py-3 text-[17px] font-black leading-7 text-[#9b522e]">⚠️ 마감 내 미입금 시 자동 취소 및 누적 경고가 부여됩니다</p>
              </>

            <div className="mt-5 space-y-3">

                <article key={item.id} className="flex flex-col gap-3 rounded-[1.4rem] border border-sand/60 bg-cream/50 p-3 sm:flex-row sm:items-center">
                  <img src={item.image} alt="" className="h-24 w-full rounded-2xl object-cover sm:h-24 sm:w-24" />
                  <div className="min-w-0 flex-1">
                    <p className="text-[17px] font-bold text-muted">{formatDate(item.wonAt)} 낙찰</p>
                    <h3 className="mt-1 line-clamp-2 text-[17px] font-black">{item.title}</h3>
                    <strong className="mt-1 block text-xl font-black text-coral-dark">{formatKRW(item.winningBid)}</strong>
                  </div>
                  {item.paymentStarted && <span className="shrink-0 rounded-full bg-[#fff0d9] px-3 py-2 text-[17px] font-black text-[#996624]">입금 절차 시작됨</span>}
                </article>
              ))}
            </div>
            {items.length > 0 && (
              <Button size="lg" disabled={paymentClock.expired} onClick={hasStarted ? onViewAccount : onStartBatchPayment} className="mt-5 min-h-16 w-full text-[18px] font-black">
                {paymentClock.expired ? "입금 마감" : hasStarted ? "🔎 계좌번호 보기" : "☑️ 전체 상품 일괄 결제 진행하기"}

                    <span className={`mt-2 inline-flex rounded-full px-3 py-1 text-[17px] font-black ${item.isBulky ? "bg-coral/15 text-coral-dark" : "bg-[#dff1e6] text-[#36704d]"}`}>{item.isBulky ? "대형 · " : "일반 · "}{dday}</span>
                    <span className="mt-1 block text-[17px] font-bold text-muted">만료 {formatDate(keepUntil)}</span>

      function ShippingAddressSelectModal({ open, addresses, onClose, onConfirm }) {
        const defaultId = addresses.find((address) => address.isDefault)?.id || addresses[0]?.id || "";

      function KeepList({ items, shippingCount, addresses, onRequestShipping }) {
        const [selectedIds, setSelectedIds] = useState([]);
        const [fullOpen, setFullOpen] = useState(false);
        const [addressOpen, setAddressOpen] = useState(false);
        const sortedItems = useMemo(() => [...items].sort((left, right) => new Date(left.keepUntil || addKeepDays(left.paidAt, left.isBulky)) - new Date(right.keepUntil || addKeepDays(right.paidAt, right.isBulky))), [items]);
        const previewItems = sortedItems.slice(0, 6);
        const allSelected = sortedItems.length > 0 && selectedIds.length === sortedItems.length;

        useEffect(() => {
          setSelectedIds((current) => current.filter((id) => items.some((item) => item.id === id)));
        }, [items]);

        const toggle = (id) => setSelectedIds((current) =>
          current.includes(id) ? current.filter((value) => value !== id) : [...current, id],
        );
        const requestAddress = () => {
          if (selectedIds.length > 0) {
            setFullOpen(false);
            setAddressOpen(true);
          }

        const confirmAddress = (address) => {
          onRequestShipping(selectedIds, address);
          setAddressOpen(false);
          if (shippingCount > 0 && selectedIds.length > 0) {
            setSelectedIds([]);
            setFullOpen(false);
          }

        return (
          <section className="rounded-[2rem] border-2 border-[#add7be] bg-[#eef8f1] p-5 shadow-card sm:p-7">

                <label className="flex min-h-12 cursor-pointer items-center gap-2 rounded-2xl bg-white px-4 text-[17px] font-black">

              <KeepItemGrid items={previewItems} selectedIds={selectedIds} onToggle={toggle} />
            </div>
            <div className="mt-5 rounded-2xl border border-[#f0b0a5] bg-[#fff0ec] p-4">
              <p className="text-[17px] font-black text-coral-dark">발송일은 화·수·목 오후 5시입니다.</p>
              <p className="mt-1 text-[17px] font-bold leading-7 text-muted">신청 다음 날부터 가장 가까운 지정 발송일로 접수되며, 배송 하루 전 추가 낙찰품은 같은 상자에 합배송할 수 없습니다.</p>

            <KeepAllModal open={fullOpen} items={sortedItems} selectedIds={selectedIds} allSelected={allSelected} onToggle={toggle} onToggleAll={() => setSelectedIds(allSelected ? [] : sortedItems.map((item) => item.id))} onRequestShipping={requestAddress} onClose={() => setFullOpen(false)} />

        );

      function ShippedList({ items, onCopyTracking }) {

            <div className="mt-4 space-y-3">

                      <Button variant="dark" onClick={() => openTracking(batch.trackingNumber)} className="text-[17px]">🚚 택배 조회하기</Button>

      function PaymentModal({ open, items, mode, onClose, onComplete }) {
        const [includeShipping, setIncludeShipping] = useState(true);
        const [copyState, setCopyState] = useState("idle");
        const isRecharge = mode === "recharge";
        const itemAmount = isRecharge ? 0 : items.reduce((sum, item) => sum + item.winningBid, 0);
        const total = isRecharge ? SHIPPING_FEE : itemAmount + (includeShipping ? SHIPPING_FEE : 0);
        const summary = items.length > 1 ? `${items[0]?.title} 외 ${items.length - 1}개` : items[0]?.title;

        useEffect(() => {
          if (open) {
            setIncludeShipping(true);
            setCopyState("idle");
          }
        }, [open, mode]);

        const copyAccount = async () => {
          try {
            await navigator.clipboard.writeText(PAYMENT_ACCOUNT.number);
            setCopyState("copied");
          } catch {
            setCopyState("failed");
          }
        };

        return (
          <Modal open={open} onClose={onClose} title={isRecharge ? "택배 횟수 1회 충전" : "결제 및 계좌 안내"} description="이 팝업을 열었을 때만 입금 계좌가 표시됩니다." className="max-w-xl">
            <div className="space-y-4 p-5 text-[17px] sm:p-6">
              {!isRecharge && (
                <div className="rounded-2xl bg-white p-4">
                  <div className="flex items-center justify-between gap-3"><strong>결제 상품</strong><span className="rounded-full bg-coral/15 px-3 py-1 font-black text-coral-dark">{items.length}개</span></div>
                  <p className="mt-2 line-clamp-2 font-black leading-7">{summary}</p>
                  <div className="mt-3 flex justify-between gap-3 border-t border-sand/60 pt-3"><span className="font-bold text-muted">상품 낙찰 총액</span><strong className="text-xl text-coral-dark">{formatKRW(itemAmount)}</strong></div>

              {!isRecharge && (
                <label className="flex cursor-pointer items-start gap-3 rounded-2xl border-2 border-sky bg-[#e9f5f9] p-4">
                  <input type="checkbox" className="mt-1 h-6 w-6 shrink-0 accent-[#39798f]" checked={includeShipping} onChange={(event) => setIncludeShipping(event.target.checked)} />

                </label>
              )}
              <div className="rounded-[1.5rem] bg-ink p-5 text-white">
                <div className="flex items-end justify-between gap-3 border-b border-white/15 pb-4">

              <p className="rounded-2xl bg-coral/10 px-4 py-3 text-center text-[17px] font-black leading-7 text-coral-dark">데모용 ‘입금 완료’ 버튼입니다. 실제 서비스에서는 관리자 입금 확인 후 처리됩니다.</p>

      function AdminLoginModal({ open, onClose, onAuthenticated }) {
        const [email, setEmail] = useState("");
        const [password, setPassword] = useState("");
        const [error, setError] = useState("");
        const [loading, setLoading] = useState(false);

        useEffect(() => {
          if (!open) return;
          setEmail("");
          setPassword("");
          setError("");
          setLoading(false);
        }, [open]);

        const submit = async (event) => {
          event.preventDefault();
          setLoading(true);
          setError("");

          try {
            const client = getSupabaseClient();
            const { data, error: signInError } =
              await client.auth.signInWithPassword({
                email: email.trim(),
                password,
              });
            if (signInError) throw signInError;
            if (!isSupabaseAdmin(data.user)) {
              await client.auth.signOut();
              throw new Error("관리자 권한이 등록된 계정만 이용할 수 있어요.");
            }

            onAuthenticated(data.user);
          } catch (signInError) {
            setError(
              signInError?.message ||
                "관리자 로그인에 실패했습니다. 계정 정보를 확인해 주세요.",
            );
          } finally {
            setLoading(false);
          }
        };

        return (
          <Modal
            open={open}
            onClose={loading ? () => undefined : onClose}
            title="관리자 로그인"
            description="Supabase Auth에 등록된 관리자 계정으로 로그인해 주세요."
            className="max-w-md"
            closeOnBackdrop={!loading}
            closeOnEscape={!loading}
            showCloseButton={!loading}
          >
            <form onSubmit={submit} className="space-y-4 p-5 sm:p-6">
              <label className="block">
                <span className="mb-2 block text-sm font-extrabold">이메일</span>
                <input
                  type="email"
                  autoComplete="username"
                  required
                  autoFocus
                  value={email}
                  onChange={(event) => { setEmail(event.target.value); setError(""); }}
                  disabled={loading}
                  className="h-12 w-full rounded-2xl border border-sand bg-white px-4 outline-none focus:border-coral focus:ring-4 focus:ring-coral/15"
                  placeholder="admin@example.com"
                />
              </label>
              <label className="block">
                <span className="mb-2 block text-sm font-extrabold">비밀번호</span>
                <input
                  type="password"
                  autoComplete="current-password"
                  required
                  value={password}
                  onChange={(event) => { setPassword(event.target.value); setError(""); }}
                  disabled={loading}
                  className="h-12 w-full rounded-2xl border border-sand bg-white px-4 outline-none focus:border-coral focus:ring-4 focus:ring-coral/15"
                  placeholder="비밀번호를 입력해 주세요"
                />
              </label>
              {error ? <p role="alert" className="rounded-2xl bg-[#ffe8df] px-4 py-3 text-sm font-extrabold leading-6 text-[#a74336]">{error}</p> : null}
              <div className="grid grid-cols-2 gap-2 border-t border-sand pt-4">
                <Button variant="outline" onClick={onClose} disabled={loading}>취소</Button>
                <Button type="submit" disabled={loading} aria-busy={loading || undefined}>
                  {loading ? <><span className="h-4 w-4 animate-spin rounded-full border-2 border-white/45 border-t-white" aria-hidden="true" />로그인 중...</> : "관리자 로그인"}
                </Button>
              </div>
            </form>
          </Modal>
        );
      }

          onSend(sale.buyerId, message);
          setDraft("");

        return (
          <Modal open={Boolean(sale)} onClose={onClose} title={`💬 ${sale?.buyerName || "낙찰자"}님 1:1 톡`} description="입금·상품·배송 문의를 바로 처리할 수 있습니다." className="max-w-lg">

      function AdminPage({ role, sales, shippingQueue, shippedItems, adminCsMessages, onUnlock, onRegisterShipment, onSendAdminCsMessage }) {
        const [previewRequest, setPreviewRequest] = useState(null);
        const [shippingRequest, setShippingRequest] = useState(null);
        const [chatSale, setChatSale] = useState(null);
        if (role !== "admin") return <AdminAccessGate onUnlock={onUnlock} />;

        const recentDateGroups = Array.from({ length: 7 }, (_, offset) => {
          const date = new Date();
          date.setDate(date.getDate() - offset);
          const matchesDate = (value) => {
            const target = new Date(value);
            return target.getFullYear() === date.getFullYear() && target.getMonth() === date.getMonth() && target.getDate() === date.getDate();
          };
          const prefix = offset === 0 ? "오늘 · " : offset === 1 ? "어제 · " : "";
          return { key: `${date.getFullYear()}-${date.getMonth() + 1}-${date.getDate()}`, label: `${prefix}${date.getMonth() + 1}월 ${date.getDate()}일 마감`, sales: sales.filter((sale) => matchesDate(sale.closedAt)) };
        });
        const total = sales.reduce((sum, sale) => sum + sale.winningBid, 0);

        return (
          <div className="space-y-8 pt-2 sm:pt-5">
            <header className="grid gap-5 md:grid-cols-[1fr_auto] md:items-end"><div><p className="text-[17px] font-black tracking-[.18em] text-coral-dark">WAREHOUSE &amp; CS</p><h1 className="mt-2 text-3xl font-black sm:text-4xl">창고 물류·고객 관리</h1><p className="mt-3 text-[17px] font-bold leading-7 text-muted">피킹부터 송장 등록, 최근 7일 낙찰자 CS까지 한 화면에서 처리하세요.</p></div><div className="flex gap-3"><div className="rounded-2xl bg-white/75 px-5 py-3 shadow-sm"><span className="block text-[17px] font-bold text-muted">최근 7일</span><strong className="text-xl">{sales.length}건</strong></div><div className="rounded-2xl bg-ink px-5 py-3 text-white shadow-sm"><span className="block text-[17px] font-bold text-white/65">낙찰 합계</span><strong className="text-xl">{formatKRW(total)}</strong></div></div></header>

            <AdminPickingPreviewModal request={previewRequest} onClose={() => setPreviewRequest(null)} />
            <ShipmentRegistrationModal request={shippingRequest} onClose={() => setShippingRequest(null)} onRegister={onRegisterShipment} />
            <AdminDirectChatModal sale={chatSale} messages={chatSale ? (adminCsMessages[chatSale.buyerId] || []) : []} onClose={() => setChatSale(null)} onSend={onSendAdminCsMessage} />
          </div>
        );

      function NewAuctionModal({ open, onClose, onSubmit }) {
        const emptyForm = {
          description: "",
          startingPrice: "20000",
        };
        const [form, setForm] = useState(emptyForm);
        const [photos, setPhotos] = useState([]);
        const [publishMode, setPublishMode] = useState("scheduled");
        const [error, setError] = useState("");
        const [isSubmitting, setIsSubmitting] = useState(false);
        const fileInputRef = useRef(null);
        const photosRef = useRef([]);
        const photosInputId = useId();
        const publishModeName = useId();

        useEffect(() => {
          photosRef.current = photos;
        }, [photos]);

        const releasePhotos = (items) => {
          items.forEach((photo) => URL.revokeObjectURL(photo.previewUrl));
        };

        const clearPhotos = () => {
          releasePhotos(photosRef.current);
          photosRef.current = [];
          setPhotos([]);
          if (fileInputRef.current) fileInputRef.current.value = "";
        };

        const resetForm = () => {
          setForm(emptyForm);
          clearPhotos();
          setPublishMode("scheduled");
          setError("");
          setIsSubmitting(false);
        };

        const closeModal = () => {
          if (isSubmitting) return;
          resetForm();
          onClose();
        };

        const update = (field, value) => {
          setForm((current) => ({ ...current, [field]: value }));
          setError("");
        };

        const selectPhotos = (event) => {
          const selectedFiles = Array.from(event.target.files || []);
          const imageFiles = selectedFiles.filter((file) => file.type.startsWith("image/"));
          const nextPhotos = imageFiles.map((file) => ({
            id: `${file.name}-${file.size}-${file.lastModified}-${Math.random().toString(36).slice(2, 8)}`,
            file,
            previewUrl: URL.createObjectURL(file),
          }));

          if (nextPhotos.length) {
            const next = [...photosRef.current, ...nextPhotos];
            photosRef.current = next;
            setPhotos(next);
          }
          setError(
            imageFiles.length === selectedFiles.length
              ? ""
              : "이미지 형식의 파일만 선택할 수 있어요.",
          );
          event.target.value = "";
        };

        const removePhoto = (photoId) => {
          const removed = photosRef.current.find((photo) => photo.id === photoId);
          if (removed) URL.revokeObjectURL(removed.previewUrl);
          const next = photosRef.current.filter((photo) => photo.id !== photoId);
          photosRef.current = next;
          setPhotos(next);
          setError("");
        };

        useEffect(() => {
          if (open) resetForm();
        }, [open]);

        useEffect(() => () => releasePhotos(photosRef.current), []);

        const submit = async (event) => {
          event.preventDefault();
          const description = form.description.trim();
          const startingPrice = Number(form.startingPrice);

          if (!description) {
            setError("상품 설명을 입력해 주세요.");
            return;
          }
          if (!Number.isInteger(startingPrice) || startingPrice < 1000) {
            setError("시작가는 1,000원 이상의 정수로 입력해 주세요.");
            return;
          }
          if (!photos.length) {
            setError("상품 사진을 하나 이상 선택해 주세요.");
            return;
          }

          const now = new Date();
          const scheduled = publishMode === "scheduled";
          setIsSubmitting(true);
          setError("");

          try {
            await onSubmit({
              title: description.split(/\r?\n/)[0] || "새 구제 의류",
              description,
              startingPrice,
              imageFiles: photos.map((photo) => photo.file),
              status: scheduled ? "pending" : "active",
              publish_at: scheduled ? nextScheduledPublishAt(now) : now.toISOString(),
            });
            resetForm();
            onClose();
          } catch (submitError) {
            setError(
              submitError?.message ||
                "상품을 등록하지 못했어요. 잠시 후 다시 시도해 주세요.",
            );
          } finally {
            setIsSubmitting(false);
          }
        };

        return (
          <Modal
            open={open}
            onClose={closeModal}
            title="새 경매글 작성"
            description="상품 설명과 사진을 확인한 뒤 공개 시간을 선택해 주세요."
            className="max-w-2xl"
            closeOnBackdrop={!isSubmitting}
            closeOnEscape={!isSubmitting}
            showCloseButton={!isSubmitting}
          >
            <form onSubmit={submit} className="space-y-4 p-5 sm:p-6">
              <div className="grid gap-4 sm:grid-cols-2">
                <label><span className="mb-2 block text-sm font-extrabold">시작가</span><input required min="1000" step="1000" type="number" value={form.startingPrice} onChange={(e) => update("startingPrice", e.target.value)} className="h-12 w-full rounded-2xl border border-sand bg-white px-4 outline-none focus:border-coral focus:ring-4 focus:ring-coral/15" /></label>
                <label><span className="mb-2 block text-sm font-extrabold">입찰 단위</span><input readOnly value="1,000원 (고정)" className="h-12 w-full rounded-2xl border border-sand bg-cream px-4 font-bold text-muted outline-none" /></label>
                <label className="sm:col-span-2"><span className="mb-2 block text-sm font-extrabold">상품 설명</span><textarea required autoFocus rows="5" value={form.description} onChange={(e) => update("description", e.target.value)} className="w-full resize-none rounded-2xl border border-sand bg-white px-4 py-3 outline-none focus:border-coral focus:ring-4 focus:ring-coral/15" placeholder={"첫 줄: 상품명·사이즈를 적어 주세요.\n둘째 줄부터: 실측, 사용감, 오염 여부를 자세히 적어 주세요."} /><span className="mt-1.5 block text-sm font-bold text-muted">첫 줄이 카드의 굵은 대표 문구로 표시됩니다.</span></label>
                <div className="sm:col-span-2">
                  <label htmlFor={photosInputId} className="mb-2 block text-sm font-extrabold">상품 사진</label>
                  <input
                    ref={fileInputRef}
                    id={photosInputId}
                    type="file"
                    multiple
                    accept="image/*"
                    onChange={selectPhotos}
                    className="block min-h-12 w-full cursor-pointer rounded-2xl border border-sand bg-white text-sm font-bold text-muted file:mr-4 file:min-h-12 file:cursor-pointer file:border-0 file:bg-[#f3d9cd] file:px-4 file:font-extrabold file:text-[#8d493c] hover:file:bg-[#ecc8bb] focus:outline-none focus:ring-4 focus:ring-coral/15"
                  />
                  <span className="mt-1.5 block text-xs font-bold leading-5 text-muted">여러 장을 한 번에 선택할 수 있으며, 첫 사진이 대표 이미지로 보여요.</span>

                  {photos.length ? (
                    <ul className="mt-3 grid grid-cols-2 gap-3 sm:grid-cols-3" aria-label="선택한 상품 사진">
                      {photos.map((photo, index) => (
                        <li key={photo.id} className="relative overflow-hidden rounded-2xl border border-sand bg-white shadow-sm">
                          <img src={photo.previewUrl} alt={`선택한 상품 사진 ${index + 1}`} className="h-32 w-full object-cover" />
                          <div className="px-2.5 py-2">
                            <p className="truncate text-xs font-bold text-muted">{index === 0 ? "대표 · " : ""}{photo.file.name}</p>
                          </div>
                          <button
                            type="button"
                            onClick={() => removePhoto(photo.id)}
                            className="absolute right-2 top-2 grid h-10 w-10 place-items-center rounded-full border-2 border-white bg-ink/80 text-xl font-black text-white shadow-md transition hover:bg-coral-dark focus:outline-none focus:ring-4 focus:ring-coral/30"
                            aria-label={`${photo.file.name} 사진 삭제`}
                          >
                            ×
                          </button>
                        </li>
                      ))}
                    </ul>
                  ) : (
                    <div className="mt-3 rounded-2xl border border-dashed border-sand bg-white/45 px-4 py-7 text-center text-sm font-bold text-muted">선택한 사진이 없습니다.</div>
                  )}
                </div>
              </div>

              <fieldset className="rounded-2xl border border-sand bg-white/55 p-3.5 sm:p-4">
                <legend className="px-1 text-sm font-extrabold text-ink">오픈 시간</legend>
                <div className="grid gap-2 sm:grid-cols-2">
                  <label className={`flex min-h-20 cursor-pointer items-start gap-3 rounded-2xl border-2 p-3.5 transition ${publishMode === "scheduled" ? "border-coral bg-[#fff2ec] shadow-sm" : "border-sand bg-white hover:border-coral/50"}`}>
                    <input
                      type="radio"
                      name={publishModeName}
                      value="scheduled"
                      checked={publishMode === "scheduled"}
                      onChange={() => { setPublishMode("scheduled"); setError(""); }}
                      className="mt-1 h-5 w-5 accent-[#d96654]"
                    />
                    <span><strong className="block break-keep text-[15px]">다음날 오전 10시 예약 등록</strong><small className="mt-1 block break-keep font-bold leading-5 text-muted">예약 대기 상태로 저장 후 자동 공개</small></span>
                  </label>
                  <label className={`flex min-h-20 cursor-pointer items-start gap-3 rounded-2xl border-2 p-3.5 transition ${publishMode === "immediate" ? "border-coral bg-[#fff2ec] shadow-sm" : "border-sand bg-white hover:border-coral/50"}`}>
                    <input
                      type="radio"
                      name={publishModeName}
                      value="immediate"
                      checked={publishMode === "immediate"}
                      onChange={() => { setPublishMode("immediate"); setError(""); }}
                      className="mt-1 h-5 w-5 accent-[#d96654]"
                    />
                    <span><strong className="block text-[15px]">즉시 올리기</strong><small className="mt-1 block break-keep font-bold leading-5 text-muted">등록 완료와 동시에 경매 피드에 공개</small></span>
                  </label>
                </div>
              </fieldset>

              {error ? <p role="alert" className="rounded-2xl bg-[#ffe8df] px-4 py-3 text-sm font-extrabold leading-6 text-[#a74336]">{error}</p> : null}

              <div className="flex flex-col-reverse gap-2 border-t border-sand pt-4 sm:flex-row">
                <Button variant="outline" className="flex-1" onClick={closeModal} disabled={isSubmitting}>취소</Button>
                <Button type="submit" className="flex-[1.5]" disabled={isSubmitting} aria-busy={isSubmitting || undefined}>
                  {isSubmitting ? (
                    <>
                      <span className="h-4 w-4 animate-spin rounded-full border-2 border-white/45 border-t-white" aria-hidden="true" />
                      사진 업로드 중...
                    </>
                  ) : "상품 등록"}
                </Button>
              </div>
            </form>
          </Modal>
        );
      }

      function Toast({ message, onDone }) {
        useEffect(() => {
          if (!message) return undefined;
          const timer = window.setTimeout(onDone, 2600);
          return () => window.clearTimeout(timer);
        }, [message, onDone]);
        if (!message) return null;
        return ReactDOM.createPortal(
          <div className="fixed bottom-24 left-1/2 z-[200] -translate-x-1/2 rounded-2xl bg-ink px-5 py-3 text-sm font-bold text-white shadow-float animate-pop md:bottom-8" role="status">✓ {message}</div>,
          document.body,
        );
      }

      /* ------------------------------------------------------------------
       * Application State
       * ------------------------------------------------------------------ */
      function App() {
        const [page, setPage] = useState("feed");
        const [role, setRole] = useState("user");
        const [posts, setPosts] = useState([]);
        const [productsLoading, setProductsLoading] = useState(true);
        const [productsError, setProductsError] = useState("");
        const [adminAuthenticated, setAdminAuthenticated] = useState(false);
        const [adminLoginOpen, setAdminLoginOpen] = useState(false);
        const [profile, setProfile] = useState(loadSavedProfile);
        const [auctionNow, setAuctionNow] = useState(() => new Date());
        const [wonItems, setWonItems] = useState(WON_AUCTIONS);
        const [keepItems, setKeepItems] = useState(() => KEEP_ITEMS.map((item) => ({
          ...item,
          keepUntil: addKeepDays(item.paidAt, item.isBulky),
        })));
        const [shippingQueue, setShippingQueue] = useState(SHIPPING_QUEUE);
        const [shippedItems, setShippedItems] = useState(SHIPPED_ITEMS);
        const [paymentSession, setPaymentSession] = useState(null);
        const [shortageOpen, setShortageOpen] = useState(false);
        const [chatThreads, setChatThreads] = useState(CHAT_THREADS);
        const [chatMessages, setChatMessages] = useState(INITIAL_MESSAGES);
        const [adminCsMessages, setAdminCsMessages] = useState(INITIAL_ADMIN_CS_MESSAGES);
        const [createOpen, setCreateOpen] = useState(false);
        const [toast, setToast] = useState("");

        const showToast = useCallback((message) => setToast(message), []);

        const loadPublishedProducts = useCallback(
          async ({ showLoading = true } = {}) => {
            if (showLoading) setProductsLoading(true);

            try {
              const products = await fetchPublishedProducts();
              setPosts(products);
              setProductsError("");
              return true;
            } catch (loadError) {
              setProductsError(
                loadError?.message ||
                  "Supabase에서 상품 목록을 불러오지 못했습니다.",
              );
              return false;
            } finally {
              if (showLoading) setProductsLoading(false);
            }
          },
          [],
        );

        useEffect(() => {
          const timer = window.setInterval(() => setAuctionNow(new Date()), 1000);
          return () => window.clearInterval(timer);
        }, []);

        useEffect(() => {
          let active = true;
          let productChannel;

          const connect = async () => {
            await loadPublishedProducts();
            if (!active) return;

            let client;
            try {
              client = getSupabaseClient();
            } catch {
              return;
            }
            productChannel = client
              .channel("standalone-products-feed")
              .on(
                "postgres_changes",
                {
                  event: "*",
                  schema: "public",
                  table: "products",
                },
                () => {
                  void loadPublishedProducts({ showLoading: false });
                },
              )
              .subscribe((status) => {
                if (status === "CHANNEL_ERROR" || status === "TIMED_OUT") {
                  setProductsError(
                    "상품 실시간 연결이 끊어졌습니다. 다시 불러오기를 눌러 주세요.",
                  );
                }
              });
          };

          void connect();
          return () => {
            active = false;
            if (productChannel) {
              void getSupabaseClient().removeChannel(productChannel);
            }
          };
        }, [loadPublishedProducts]);

        useEffect(() => {
          let active = true;
          let authSubscription;

          try {
            const client = getSupabaseClient();
            const applySession = (session) => {
              if (!active) return;
              const isAdmin = isSupabaseAdmin(session?.user);
              setAdminAuthenticated(isAdmin);
              if (!isAdmin) setRole("user");
            };

            void client.auth
              .getSession()
              .then(({ data }) => {
                applySession(data.session);
              })
              .catch(() => applySession(null));
            const { data } = client.auth.onAuthStateChange((_event, session) => {
              applySession(session);
            });
            authSubscription = data.subscription;
          } catch {
            setAdminAuthenticated(false);
          }

          return () => {
            active = false;
            authSubscription?.unsubscribe();
          };
        }, []);

        const appendChatMessage = (threadId, text) => {
          const trimmed = String(text || "").trim();
          if (!trimmed) return;
          const message = { id: `chat-local-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`, mine: true, text: trimmed, time: "방금" };
          setChatMessages((current) => ({
            ...current,
            [threadId]: [...(current[threadId] || []), message],
          }));
          setChatThreads((current) => current.map((thread) =>
            thread.id === threadId
              ? { ...thread, preview: trimmed.replace(/\n/g, " "), time: "방금", unread: 0 }
              : thread,
          ));
          // TODO: 실제 서비스에서는 관리자 1:1 채팅 메시지 전송 API를 호출하세요.
        };

        const appendAdminCsMessage = (buyerId, text) => {
          const trimmed = String(text || "").trim();
          if (!buyerId || !trimmed) return;
          const message = { id: `admin-cs-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`, mine: true, text: trimmed, time: "방금" };
          setAdminCsMessages((current) => ({
            ...current,
            [buyerId]: [...(current[buyerId] || []), message],
          }));
          showToast("낙찰자에게 1:1 톡을 전송했습니다.");
          // TODO: 실제 서비스에서는 구매자별 관리자 CS 채팅방 API로 메시지를 전송하세요.
        };

        const sendProductInquiry = async (postId, message) => {
          const target = posts.find((post) => post.id === postId);
          const trimmed = String(message || "").trim();
          if (!target || !trimmed) throw new Error("문의할 상품 또는 내용이 없습니다.");
          const { lead } = splitDescription(target.description);
          appendChatMessage("chat-admin", `[상품 문의 · ${target.id}]\n${lead}\n\n${trimmed}`);
          // 중요: 현재 page를 변경하지 않아 상품 피드 화면을 그대로 유지합니다.
          showToast("관리자에게 문의가 전송되었습니다.");
        };

        const saveProfile = (nextProfile) => {
          const normalizedProfile = { ...DEFAULT_PROFILE, ...profile, ...nextProfile };
          setProfile(normalizedProfile);
          try {
            // TODO: 실제 서비스에서는 Firebase/DB의 사용자 정보 업데이트 API로 교체하세요.
            window.localStorage.setItem("damine-vintage-standalone-profile", JSON.stringify(normalizedProfile));
          } catch {
            // file:// 환경에서 저장소가 차단되어도 화면 테스트는 계속됩니다.
          }
          showToast("내 정보가 저장되었습니다.");
        };

        const placeBid = (postId, amount) => {
          // TODO: 실제 서비스에서는 서버 트랜잭션으로 마감·최신 최고가를 다시 검증하고,
          // 관리자도 수정할 수 없는 append-only 입찰 원장에 기록하세요.
          const target = posts.find((post) => post.id === postId);
          if (!target || target.status === "closed") {
            const message = "판매 완료된 상품이라 입찰할 수 없습니다.";
            showToast(message);
            throw new Error(message);
          }

          const access = getBidAccess(target, DEFAULT_PROFILE.name, new Date());
          if (!access.allowed) {
            showToast(access.reason);
            throw new Error(access.reason);
          }

          const minimumBid = getMinimumBidAmount(target);
          if (
            !Number.isInteger(amount) ||
            amount < minimumBid ||
            (amount - minimumBid) % QUICK_BID_INCREMENT !== 0
          ) {
            const message = `현재 최소 입찰가는 ${formatKRW(minimumBid)}입니다. 금액을 다시 확인해 주세요.`;
            showToast(message);
            throw new Error(message);
          }

          const bidRecord = Object.freeze({
            id: `bid-local-${Date.now()}`,
            bidderName: DEFAULT_PROFILE.name,
            amount,
            bidAt: new Date().toISOString(),
          });

          setPosts((current) => current.map((post) => {
            if (post.id !== postId) return post;
            const alreadyParticipated = post.bidHistory.some((bid) => bid.bidderName === DEFAULT_PROFILE.name);
            return {
              ...post,
              currentPrice: amount,
              participantCount: alreadyParticipated ? post.participantCount : post.participantCount + 1,
              bidHistory: Object.freeze([bidRecord, ...post.bidHistory]),
            };
          }));
          showToast(`${formatKRW(amount)}으로 입찰했습니다.`);
        };

        const openBatchPayment = (startIfNeeded = true) => {
          if (!wonItems.length) return;
          const earliestDeadline = Math.min(...wonItems.map((item) => new Date(item.paymentDeadlineAt || nextPaymentDeadline()).getTime()));
          if (Date.now() >= earliestDeadline) {
            showToast("입금 마감 시간이 지나 결제를 진행할 수 없습니다.");
            return;
          }
          if (startIfNeeded) {
            setWonItems((current) => current.map((item) => ({ ...item, paymentStarted: true })));
            // TODO: DB에 전체 상품 ID와 paymentStartedAt을 한 번에 기록하세요.
          }
          setPaymentSession({ mode: "batch" });
        };

        const openRecharge = () => {
          setShortageOpen(false);
          setPaymentSession({ mode: "recharge" });
        };

        const updateShippingCount = (delta) => {
          setProfile((current) => {
            const next = { ...current, shippingCount: Math.max(0, (current.shippingCount || 0) + delta) };
            try {
              window.localStorage.setItem("damine-vintage-standalone-profile", JSON.stringify(next));
            } catch {}
            return next;
          });
        };

        const completePayment = (includeShipping) => {
          if (!paymentSession) return;
          if (paymentSession.mode === "recharge") {
            updateShippingCount(1);
            setPaymentSession(null);
            showToast("택배 가능 횟수 1회가 충전되었습니다.");
            return;
          }

          if (!wonItems.length) {
            setPaymentSession(null);
            return;
          }
          const earliestDeadline = Math.min(...wonItems.map((item) => new Date(item.paymentDeadlineAt || nextPaymentDeadline()).getTime()));
          if (Date.now() >= earliestDeadline) {
            showToast("입금 마감 시간이 지나 완료 처리할 수 없습니다.");
            return;
          }
          const paidAt = new Date().toISOString();
          const keptItems = wonItems.map((item) => ({
            ...item,
            paymentStatus: "입금 완료",
            paidAt,
            keepUntil: addKeepDays(paidAt, item.isBulky),
          }));
          setWonItems([]);
          setKeepItems((current) => [
            ...keptItems.filter((item) => !current.some((currentItem) => currentItem.id === item.id)),
            ...current,
          ]);
          if (includeShipping) updateShippingCount(1);
          setPaymentSession(null);
          showToast(includeShipping
            ? `${keptItems.length}개 상품 결제 완료! 보관함으로 이동했고 택배 가능 횟수 1회가 추가되었습니다.`
            : `${keptItems.length}개 상품 결제 완료! 나의 보관함으로 이동했습니다.`);
          // TODO: 관리자 입금 확인 Webhook 성공 시 결제/보관함 상태를 원자적으로 변경하세요.
        };

        const requestShipping = (selectedIds, selectedAddress) => {
          if (!selectedIds.length) return;
          const shippingAddress = (profile.shippingAddresses || []).find((address) => address.id === selectedAddress?.id);
          if (!shippingAddress) {
            showToast("등록된 배송지를 선택해 주세요.");
            return;
          }
          if ((profile.shippingCount || 0) < 1) {
            setShortageOpen(true);
            return;
          }
          const selectedItems = keepItems.filter((item) => selectedIds.includes(item.id));
          if (!selectedItems.length) return;
          const scheduledAt = getNextShippingSchedule(new Date());
          setShippingQueue((current) => [{
            id: `shipping-${Date.now()}`,
            buyerId: profile.id,
            buyerName: profile.name,
            requestedAt: new Date().toISOString(),
            scheduledAt,
            address: { ...shippingAddress },
            items: selectedItems,
          }, ...current]);
          setKeepItems((current) => current.filter((item) => !selectedIds.includes(item.id)));
          updateShippingCount(-1);
          showToast(`배송 예정일: ${formatShippingSchedule(scheduledAt)} 오후 5시 한진택배 발송 예정`);
          // TODO: 발송 묶음을 관리자 대기열에 생성하고 이용권 1회를 서버 트랜잭션으로 차감하세요.
        };

        const registerShipment = (requestId, trackingNumber) => {
          const request = shippingQueue.find((item) => item.id === requestId);
          if (!request) {
            showToast("발송 요청을 찾을 수 없습니다.");
            return;
          }
          const shippedBatch = {
            ...request,
            courier: "한진택배",
            trackingNumber,
            shippedAt: new Date().toISOString(),
          };
          setShippingQueue((current) => current.filter((item) => item.id !== requestId));
          setShippedItems((current) => [shippedBatch, ...current]);
          showToast(`${request.buyerName || request.address?.recipientName}님의 송장이 등록되었습니다.`);
          // TODO: 실제 서비스에서는 발송 건과 구매자 프로필 배송 현황을 하나의 서버 트랜잭션으로 동기화하세요.
        };

        const copyTracking = async (trackingNumber) => {
          try {
            if (navigator.clipboard?.writeText) {
              try {
                await navigator.clipboard.writeText(trackingNumber);
                showToast("송장번호가 복사되었습니다.");
                return;
              } catch {
                // file:// 또는 보안 컨텍스트가 아닌 환경에서는 아래 방식으로 재시도합니다.
              }
            }

            const textarea = document.createElement("textarea");
            textarea.value = trackingNumber;
            textarea.setAttribute("readonly", "");
            textarea.style.position = "fixed";
            textarea.style.opacity = "0";
            document.body.appendChild(textarea);
            textarea.select();
            const copied = document.execCommand("copy");
            textarea.remove();
            if (!copied) throw new Error("copy-failed");
            showToast("송장번호가 복사되었습니다.");
          } catch {
            showToast("복사가 차단되었습니다. 송장번호를 길게 눌러 복사해 주세요.");
          }
        };

        const createAuction = async (values) => {
          if (!values.imageFiles?.length) {
            throw new Error("상품 사진이 필요합니다.");
          }
          if (!adminAuthenticated) {
            setAdminLoginOpen(true);
            throw new Error("관리자 로그인이 필요합니다.");
          }

          await createSupabaseProduct(values);
          await loadPublishedProducts({ showLoading: false });
          if (values.status === "active") setPage("feed");
          showToast(
            values.status === "pending"
              ? "새 경매글이 다음날 오전 10시 공개로 예약되었습니다."
              : "새 경매글이 피드에 즉시 등록되었습니다.",
          );
        };

        const requestRoleChange = (nextRole) => {
          if (nextRole === "user") {
            setRole("user");
            return;
          }
          if (adminAuthenticated) {
            setRole("admin");
            return;
          }
          setAdminLoginOpen(true);
        };

        const completeAdminLogin = () => {
          setAdminAuthenticated(true);
          setRole("admin");
          setAdminLoginOpen(false);
          showToast("관리자 계정으로 로그인했습니다.");
        };

        const salesWithCurrentProfile = useMemo(() => ADMIN_SALES.map((sale) =>
          sale.buyerId === profile.id
            ? { ...sale, buyerName: profile.name, phone: profile.phone, address: profile.address }
            : sale,
        ), [profile]);

        const navigate = (nextPage) => {
          setPage(nextPage);
          window.scrollTo({ top: 0, behavior: "smooth" });
        };

        return (
          <>
            <SiteHeader page={page} role={role} onRoleChange={requestRoleChange} onNavigate={navigate} onCreateAuction={() => setCreateOpen(true)} />
            <main className="mx-auto min-h-[calc(100vh-80px)] max-w-[1800px] px-3 pb-28 pt-5 sm:px-4 sm:pt-7 md:pb-14 lg:px-5">
              {page === "feed" && (
                <div className="grid items-start gap-3 lg:grid-cols-[minmax(0,1fr)_235px] xl:grid-cols-[170px_minmax(0,1fr)_235px] xl:gap-4">
                  <OnlineMembersSidebar className="hidden xl:block" />
                  <div className="min-w-0"><FeedPage posts={posts} currentUserName={DEFAULT_PROFILE.name} auctionNow={auctionNow} onBid={placeBid} onInquiry={sendProductInquiry} loading={productsLoading} error={productsError} onRetry={() => loadPublishedProducts()} /></div>
                  <LiveBidSidebar posts={posts} currentUserName={DEFAULT_PROFILE.name} auctionNow={auctionNow} onBid={placeBid} className="hidden lg:block" />
                </div>
              )}
              {page === "chat" && <div className="mx-auto max-w-7xl"><ChatPage threads={chatThreads} messages={chatMessages} onSendMessage={appendChatMessage} /></div>}
              {page === "profile" && <div className="mx-auto max-w-7xl"><ProfilePage profile={profile} onSave={saveProfile} wonItems={wonItems} now={auctionNow} onStartBatchPayment={() => openBatchPayment(true)} onViewAccount={() => openBatchPayment(false)} keepItems={keepItems} onRequestShipping={requestShipping} shippingQueue={shippingQueue.filter((item) => !item.buyerId || item.buyerId === profile.id)} shippedItems={shippedItems.filter((item) => !item.buyerId || item.buyerId === profile.id)} onCopyTracking={copyTracking} onRecharge={openRecharge} /></div>}
              {page === "admin" && <div className="mx-auto max-w-7xl"><AdminPage role={role} sales={salesWithCurrentProfile} shippingQueue={shippingQueue} shippedItems={shippedItems} adminCsMessages={adminCsMessages} onUnlock={() => requestRoleChange("admin")} onRegisterShipment={registerShipment} onSendAdminCsMessage={appendAdminCsMessage} /></div>}
            </main>
            <Navigation page={page} role={role} onNavigate={navigate} mobile />
            <AdminLoginModal open={adminLoginOpen} onClose={() => setAdminLoginOpen(false)} onAuthenticated={completeAdminLogin} />
            <NewAuctionModal open={createOpen} onClose={() => setCreateOpen(false)} onSubmit={createAuction} />
            <PaymentModal
              open={Boolean(paymentSession)}
              mode={paymentSession?.mode}
              items={wonItems}
              onClose={() => setPaymentSession(null)}
              onComplete={completePayment}
            />
            <ShippingShortageModal open={shortageOpen} onClose={() => setShortageOpen(false)} onRecharge={openRecharge} />
            <FloatingAdminChat thread={chatThreads.find((thread) => thread.id === "chat-admin")} messages={chatMessages["chat-admin"] || []} onSendMessage={appendChatMessage} />
            <Toast message={toast} onDone={() => setToast("")} />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
